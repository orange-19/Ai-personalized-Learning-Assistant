# Application name
spring.application.name=backend-2

# PostgreSQL datasource for JPA
# Database name: backenddb
spring.datasource.url=jdbc:postgresql://localhost:5432/backenddb
spring.datasource.username=postgres
spring.datasource.password=orange@2005
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# src/main/resources/application.properties
python.api.generate-path.url=http://localhost:5000/api/generate-path

# Optional: tune HikariCP (uncomment/adjust as needed)
#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=2
